name: ShiftSchedule
options:
  bundleIdPrefix: com.myshift
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  ShiftSchedule:
    type: application
    platform: iOS
    sources:
      - path: ShiftSchedule
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ShiftSchedule/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.myshift.schedule
        CODE_SIGN_ENTITLEMENTS: ShiftSchedule/ShiftSchedule.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
    dependencies:
      - target: ShiftWidgetExtension

  ShiftWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShiftWidgetExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ShiftWidgetExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.myshift.schedule.widget
        CODE_SIGN_ENTITLEMENTS: ShiftWidgetExtension/ShiftWidgetExtension.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

schemes:
  ShiftSchedule:
    build:
      targets:
        ShiftSchedule: all
        ShiftWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
