workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "ShiftSchedule.xcodeproj"
        XCODE_SCHEME: "ShiftSchedule"
      xcode: latest
      ios_signing:
        distribution_type: development
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.myshift.schedule" --type IOS_APP_DEVELOPMENT
          app-store-connect fetch-signing-files "com.myshift.schedule.widget" --type IOS_APP_DEVELOPMENT
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcodebuild clean build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -derivedDataPath build
      - name: Create IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/ShiftSchedule.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa
    artifacts:
      - build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  # 如果你只是想在真机上测试（无需签名），保留原来的无签名构建
  ios-unsigned:
    name: iOS Unsigned Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "ShiftSchedule.xcodeproj"
        XCODE_SCHEME: "ShiftSchedule"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build iOS app
        script: |
          xcodebuild clean build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
      - name: Create unsigned IPA
        script: |
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/ShiftSchedule.app build/Payload/
          cd build
          zip -r ShiftSchedule-unsigned.ipa Payload
    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log
