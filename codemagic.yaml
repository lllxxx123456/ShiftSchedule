workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "ShiftSchedule.xcodeproj"
        XCODE_SCHEME: "ShiftSchedule"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build iOS app
        script: |
          xcodebuild clean build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
      - name: Create unsigned IPA
        script: |
          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/ShiftSchedule.app build/Payload/
          cd build
          zip -r ShiftSchedule-unsigned.ipa Payload
    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log
